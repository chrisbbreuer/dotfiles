# Dependencies — managed by Pantry (https://github.com/pantry-pm/pantry)
#
# Install / sync everything with:  pantry install   (Pantry ≥ 0.10.1)
#
# Notes:
#   - `deps:` is Pantry's shorthand for `dependencies:` (both work).
#   - starship was removed: the prompt is now native to Den (see .config/den.jsonc).
#   - Zig is Den's build toolchain and is managed by Pantry like everything else.
#     Den tracks Zig's master branch, so we pin the dev build Den is known to
#     build against. `pantry install` fetches it from Pantry's registry (Pantry
#     syncs Zig dev/nightly builds every few hours via its sync-zig-dev workflow).
#   - GUI apps and fonts live in sibling files — see ./apps.yaml and ./fonts.yaml.
#     Pantry reads them automatically alongside this file and installs them on
#     macOS as part of the same `pantry install`.
global: true

# ---------------------------------------------------------------------------
# Command-line tools
# ---------------------------------------------------------------------------
deps:
  bun.sh: ^1.3.14
  git-scm.org: ^2.51.0
  cli.github.com: ^2.73.0
  gnu.org/bash: ^5.2.37
  gnu.org/coreutils: ^9.7.0
  gnu.org/grep: ^3.12.0
  crates.io/eza: ^0.21.3
  ziglang.org: 0.17.0-dev.607+456b2ec07  # exact dev build Den is pinned to and builds cleanly against (see home-lang/den release.yml)
  anthropic.com/claude-code: ^2.1.185
  openai.com/codex: ^0.141.0
