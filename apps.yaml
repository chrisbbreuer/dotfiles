# GUI applications — installed by `pantry install` on macOS from Pantry's OWN
# registry (registry.pantry.dev). No Homebrew, no `brew`, no `mas` for casks:
# Pantry downloads each app's prebuilt artifact for your platform and installs the
# `.app` directly (see install/native_apps.zig in pantry).
#
# Entries are one of:
#   - <domain>                        a Pantry app package, e.g. `ghostty.org`
#                                     (NOT a Homebrew cask slug like `ghostty`)
#   - { mas: "<id>", name: <App> }    Mac App Store app by id (opens the App Store)
#
# Verify any package at registry.pantry.dev/binaries/<domain>/metadata.json or
# https://pantry.dev/packages. Installs are idempotent.
- 1password.com
- arc.net
- cursor.com
- discord.com
- docker.com/desktop
- ghostty.org            # terminal — point its shell at ~/.local/bin/den
- github.com/desktop     # GitHub Desktop
- hiddenbar.app
- iina.io
- imageoptim.com
- insomnia.rest
- raycast.com
- slack.com
- the-unarchiver.com
- transmit.panic.com
- code.visualstudio.com
- vlc.app

# Mac App Store apps — installed via the App Store (need it signed in):
- { mas: "1402042596", name: AdBlock }
- { mas: "1462114288", name: Grammarly for Safari }
- { mas: "1472777122", name: Honey }
- { mas: "1520333300", name: Wappalyzer }
- { mas: "1147396723", name: WhatsApp }

