# GUI applications — installed by `pantry install` on macOS from Pantry's OWN
# registry (registry.pantry.dev). No Homebrew, no `brew`: Pantry downloads each
# app's prebuilt artifact for your platform and installs the `.app` directly
# (see install/native_apps.zig in pantry).
#
# Entries are one of:
#   - <domain>                        a Pantry app package, e.g. `ghostty.org`
#                                     (NOT a Homebrew cask slug like `ghostty`)
#   - { mas: "<id>", name: <App> }    Mac App Store app by id (installed silently
#                                     via CommerceKit — no `mas`, no App Store window)
#
# Verify any package at registry.pantry.dev/binaries/<domain>/metadata.json or
# https://pantry.dev/packages. Installs are idempotent.
- code.visualstudio.com
- codex.openai.com       # Codex desktop app (GUI; the `codex` CLI is openai.com/codex in deps.yaml)
- diabrowser.com         # Dia (The Browser Company) — used instead of Arc
- discord.com
- ghostty.org            # terminal — point its shell at ~/.local/bin/den
- github.com/desktop     # GitHub Desktop
- hiddenbar.app
- iina.io
- imageoptim.com
- insomnia.rest
- logitech.com/options-plus  # Logi Options+ — installs the installer app; run it once
- mediaarea.net          # MediaInfo
- muzzleapp.com          # Muzzle
- orbstack.dev           # OrbStack (Docker/Linux VMs) — used instead of Docker Desktop
- pearcleaner.app
- raycast.com
- slack.com
- the-unarchiver.com
- transmit.panic.com
- vlc.app
- zed.dev                # primary editor — set as $EDITOR/$VISUAL in env.sh

# Mac App Store apps — installed silently & natively (need to be signed into the
# App Store; the install step uses sudo, which fresh.sh primes for you):
- { mas: "1402042596", name: AdBlock }
- { mas: "1462114288", name: Grammarly for Safari }
- { mas: "1472777122", name: Honey }
- { mas: "1520333300", name: Wappalyzer }
- { mas: "310633997", name: WhatsApp }   # "WhatsApp Messenger" — current listing; old id 1147396723 is delisted (stale 2024 build)
