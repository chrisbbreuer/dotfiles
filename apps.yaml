# GUI applications — installed by `pantry install` on macOS (Pantry ≥ 0.10.1).
#
# Hoisted out of deps.yaml so the package list stays focused on CLI tools.
# Pantry reads this sibling file automatically alongside deps.yaml and merges
# the entries. Each entry is one of:
#   - <slug>                          Homebrew cask of that name (installed
#                                     natively from Homebrew's public cask JSON)
#   - { cask: <token> }               explicit Homebrew cask
#   - { mas: "<id>", name: <App> }    Mac App Store app by its numeric id (no
#                                     extra tooling — Pantry opens the App Store
#                                     to install, skipping any already installed)
#
# Installs are idempotent; Mac App Store installs need the App Store signed in.
- 1password
- arc
- cursor
- discord
- docker
- ghostty            # terminal — point its shell at ~/.local/bin/den
- github             # GitHub Desktop
- hiddenbar
- iina
- imageoptim
- insomnia
- logi-options-plus
- mediainfo
- muzzle
- pearcleaner
- raycast
- rewind
- slack
- the-unarchiver
- transmit
- visual-studio-code
- vlc
